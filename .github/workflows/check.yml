name: check
on:
  pull_request:
  push:
    branches:
    - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    strategy:
      matrix:
        platform:
        - host: macos-latest
        - host: ubuntu-latest
    runs-on: ${{ matrix.platform.host }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: ./.github/actions/install-nix
      with:
        cachixAuthToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
    - name: Free Disk Space
      if: ${{ runner.os == 'Linux' }}
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
      with:
        tool-cache: false
    - run: nix flake check -L
    - if: github.event_name == 'push' && runner.os == 'macOS'
      run: nix build -L .#darwinConfigurations.iridium.system
    - if: github.event_name == 'push' && runner.os == 'Linux'
      run: |
        nix build -L .#nixosConfigurations.cobalt.config.system.build.toplevel
        nix build -L .#nixosConfigurations.osmium.config.system.build.toplevel

    # TODO: Build and run a VM, test
